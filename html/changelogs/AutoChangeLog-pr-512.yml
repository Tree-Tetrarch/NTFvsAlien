changes:
  - rscadd: "Reworked the character creator with clearer grouped customization sections."
  - rscadd: "Added taur body customization support."
  - rscadd: "Re-enabled Vatborn character creation support."
  - rscadd: "Added xenomorph hybrid head and dorsal customization support."
  - rscadd: "Added lightweight Teshari species support for testing and development."
  - rscadd: "Added Teshari ears, tails, taur bodies, and related sprite accessory support."
  - rscadd: "Added Teshari-specific worn sprite support for several clothing slots."
  - rscadd: "Added Teshari ID, underwear, and focused armor sprite support."
  - rscadd: "Added species-specific worn icon fallback handling for Teshari."
  - rscadd: "Added lightweight genital display states, including stored, partial, flaccid, and erect visuals."
  - rscadd: "Added sheath and slit storage handling for penis customization."
  - rscadd: "Added a tester-only Teshari species picker whitelist while Teshari remains unavailable for normal roundstart selection."
  - imageadd: "Added new Teshari, taur, xeno hybrid, humanoid greyscale, and clothing sprite assets."
  - qol: "Improved character creator organization so body, head, back/tail/wing, and soft anatomy options are easier to navigate."
  - bugfix: "Fixed several character creator preview, sprite layering, and species customization issues"
  - refactor: "Moved the character creator into the native code path instead of keeping it as a modular override."